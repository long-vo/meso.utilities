name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno check src/sanitize.test.ts

      - name: Test
        run: deno test --allow-read

      # Slidedown is a Vite/React/TS app; `deno task build` runs `tsc && vite build`,
      # so this is its type-check gate on every PR.
      - name: Build Slidedown
        run: cd slidedown && deno install && deno task build
