<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>HTML slide</title>
  </head>
  <body>
    <h1>Hand-written HTML</h1>
    <p>
      Drop any <strong>.html</strong> file and it becomes a single slide. The
      markup is sanitized (scripts are dropped), and inline
      <span style="color: var(--accent)">styles</span> are kept.
    </p>
    <ul>
      <li>Full documents or bare fragments both work</li>
      <li>Links open in a new tab, like everywhere else</li>
    </ul>
  </body>
</html>
