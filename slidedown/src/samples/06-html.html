<h1>HTML, too</h1>
<p>
  Drop a plain <strong>.html</strong> file and it becomes one slide. The markup
  is sanitized — scripts are dropped and links open safely — while your inline
  <span style="color: var(--accent)">styles</span> come along for the ride.
</p>
<ul>
  <li>Full documents or bare fragments both work</li>
  <li>Handy for a chart, table, or snippet you already have as HTML</li>
</ul>
